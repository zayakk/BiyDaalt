<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Registration</title>
    <script>
        async function registerProduct() {
            const productName = document.getElementById('product_name').value;
            const productCode = document.getElementById('product_code').value;
            const description = document.getElementById('description').value;

            const response = await fetch('/product_service/', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    action: "register_product",
                    product_name: productName,
                    product_code: productCode,
                    description: description
                })
            });

            const result = await response.json();
            alert(JSON.stringify(result));
        }
    </script>
</head>
<body>
    <h1>Register Product</h1>
    <form onsubmit="event.preventDefault(); registerProduct();">
        <label>Product Name:</label><br>
        <input type="text" id="product_name" required><br><br>
        <label>Product Code:</label><br>
        <input type="text" id="product_code" required><br><br>
        <label>Description:</label><br>
        <textarea id="description"></textarea><br><br>
        <button type="submit">Register</button>
    </form>
</body>
</html>
